apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-llm-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-llm-api
  template:
    metadata:
      labels:
        app: secure-llm-api
    spec:
      containers:
        - name: api
          image: secure-llm-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "sqlite:///./data/db.sqlite"
