apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secure-llm-api-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: secure-llm-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: secure-llm-api
                port:
                  number: 80
